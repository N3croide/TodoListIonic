<ion-header translucent class="ion-margin-top">
   <ion-toolbar>
      <ion-buttons slot="start">
         <ion-back-button defaultHref="/todos"></ion-back-button>
      </ion-buttons>
      <ion-title>Detalle</ion-title>
      <ion-buttons slot="end">
         <ion-button [disabled]="form.invalid" (click)="save()">Guardar</ion-button>
      </ion-buttons>
   </ion-toolbar>
</ion-header>

@if (todo(); as t) {
<ion-content class="ion-padding">
   <form [formGroup]="form">
      <ion-list>
         <ion-item>
            <ion-input label="Título *" labelPlacement="stacked" placeholder="¿Qué hay que hacer?" formControlName="title"> </ion-input>
         </ion-item>
         <ion-item>
            <ion-textarea label="Descripción" labelPlacement="stacked" [rows]="3" formControlName="description"> </ion-textarea>
         </ion-item>
         <ion-item>
            <ion-select label="Prioridad" labelPlacement="stacked" formControlName="priority">
               <ion-select-option value="low">Baja</ion-select-option>
               <ion-select-option value="medium">Media</ion-select-option>
               <ion-select-option value="high">Alta</ion-select-option>
            </ion-select>
         </ion-item>
      </ion-list>
   </form>

   <ion-text color="medium" class="ion-padding-start" style="font-size: 12px"> Creado: {{ t.createdAt | date:'dd/MM/yyyy HH:mm' }} </ion-text>

   <ion-row class="ion-justify-content-center ion-align-items-center">
      <ion-button expand="block" color="primary" fill="outline" class="ion-margin-top button" (click)="returnToList()"> Cancelar </ion-button>
      <ion-button expand="block" class="ion-margin-top" type="button" color="success" [disabled]="form.invalid" (click)="save()"> Agregar </ion-button>
   </ion-row>
</ion-content>
}
